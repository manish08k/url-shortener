<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 16px;
      color: #222;
    }

    h1 { font-size: 1.4rem; margin-bottom: 24px; }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      padding: 8px 10px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }

    input:focus { border-color: #555; }

    button {
      padding: 8px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      border: 1px solid #555;
      border-radius: 4px;
      background: #fff;
    }

    button:hover { background: #f5f5f5; }

    #result { font-size: 0.95rem; margin-bottom: 24px; }
    #result a { color: #0066cc; }
    #error { color: red; font-size: 0.9rem; margin-bottom: 12px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; border-bottom: 2px solid #ccc; padding: 6px 8px; }
    td { padding: 6px 8px; border-bottom: 1px solid #eee; }
    td a { color: #0066cc; }
    .muted { color: #888; }
  </style>
</head>
<body>

  <h1>URL Shortener</h1>

  <div class="row">
    <input id="urlInput" type="text" placeholder="https://example.com/long-url" />
    <button onclick="shortenURL()">Shorten</button>
  </div>

  <div id="error"></div>
  <div id="result"></div>

  <hr style="margin-bottom:20px">

  <table>
    <thead>
      <tr>
        <th>Short URL</th>
        <th>Original</th>
        <th>Clicks</th>
      </tr>
    </thead>
    <tbody id="statsBody">
      <tr><td colspan="3" class="muted">No links yet.</td></tr>
    </tbody>
  </table>

  <script>
    async function shortenURL() {
      const input = document.getElementById("urlInput");
      const error = document.getElementById("error");
      const result = document.getElementById("result");

      error.textContent = "";
      result.textContent = "";

      const url = input.value.trim();
      if (!url) return;

      try {
        const res = await fetch("/shorten", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ long_url: url }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Error");

        result.innerHTML = `Short URL: <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;
        loadStats();
      } catch (e) {
        error.textContent = e.message;
      }
    }

    async function loadStats() {
      const tbody = document.getElementById("statsBody");
      const res = await fetch("/api/stats");
      const data = await res.json();

      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="muted">No links yet.</td></tr>';
        return;
      }

      tbody.innerHTML = data.slice().reverse().map(item => `
        <tr>
          <td><a href="${item.short_url}" target="_blank">${item.short_url}</a></td>
          <td class="muted" title="${item.original_url}" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.original_url}</td>
          <td>${item.clicks}</td>
        </tr>
      `).join("");
    }

    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") shortenURL();
    });

    loadStats();
  </script>
</body>
</html>
